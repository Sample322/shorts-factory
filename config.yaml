  # РІРµСЃСЊ Р±Р°С‚С‡ СЃРµСЂРёР№ РѕРґРЅРёРј prompt'РѕРј: analyze.py СЂРµР¶РµС‚ РґР»РёРЅРЅС‹Рµ С‚СЂР°РЅСЃРєСЂРёРїС‚С‹ РЅР° С‡Р°РЅРєРё.
