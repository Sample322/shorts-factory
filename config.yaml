  # РљР»РёРїС‹, РїРµСЂРµРєСЂС‹РІР°СЋС‰РёРµ Р·Р°СЃС‚Р°РІРєСѓ, РџРћР”Р“РћРќРЇР®РўРЎРЇ (start СЃРґРІРёРіР°РµС‚СЃСЏ Р·Р° intro_end).
  intro_detector_enabled: true
  intro_detector_max_check_sec: 180   # РёС‰РµРј intro РІ РїРµСЂРІС‹С… 180 СЃРµРє
  outro_detector_max_check_sec: 120   # РёС‰РµРј outro РІ РїРѕСЃР»РµРґРЅРёС… 120 СЃРµРє
  intro_detector_speech_threshold: 12 # СЃР»РѕРІ/10СЃРµРє РґР»СЏ РѕРїСЂРµРґРµР»РµРЅРёСЏ "РїР»РѕС‚РЅРѕРіРѕ РґРёР°Р»РѕРіР°"
  #
  # РњРёРЅРёРјСѓРј Р¶РёРІС‹С… СЃР»РѕРІ РІ РєР»РёРїРµ. Р—Р°С‰РёС‚Р° РѕС‚ РІС‹Р±РѕСЂР° РјРѕРјРµРЅС‚РѕРІ "С‚РёС€РёРЅР° + РјСѓР·С‹РєР°",
  # РіРґРµ Content ID 100% РјР°С‚С‡РёС‚ РѕСЂРёРіРёРЅР°Р»СЊРЅС‹Р№ score.
  min_dialogue_words: 8
  min_first_3sec_words: 2
  #
  # AI disclosure for YouTube metadata. Disabled: mentioning AI in descriptions can hurt promotion.
  # Keep this false unless platform policy requires an explicit disclosure.
  ai_disclosure_in_description: false
  #
  # Rights manifest: РІРЅСѓС‚СЂРµРЅРЅРёР№ Р°СѓРґРёС‚-РґРѕРєСѓРјРµРЅС‚, РЅРµ РїСѓР±Р»РёРєСѓРµС‚СЃСЏ.
  # РџРѕР»РµР·РµРЅ РґР»СЏ disputing claims.
  write_rights_manifest: true
  #
  # вљЎ Vocal isolation (demucs htdemucs) вЂ” СЂРµС€РµРЅРёРµ РґР»СЏ "No restriction" claims.
  # РћС‚РґРµР»СЏРµС‚ РіРѕР»РѕСЃ Р°РєС‚С‘СЂРѕРІ РѕС‚ РѕСЂРёРіРёРЅР°Р»СЊРЅРѕРіРѕ score в†’ Content ID РЅРµ РјР°С‚С‡РёС‚ РјСѓР·С‹РєСѓ.
  # РЎС‚РѕРёРјРѕСЃС‚СЊ: +20-40 СЃРµРє РЅР° РєР»РёРї (CUDA), РјРѕРґРµР»СЊ 80MB.
  # Р’РљР›Р®Р§Р•РќРћ: demucs 4.0.1 + htdemucs РјРѕРґРµР»СЊ СѓСЃС‚Р°РЅРѕРІР»РµРЅС‹.
  vocal_isolation_enabled: true
  vocal_isolation_model: "htdemucs"

